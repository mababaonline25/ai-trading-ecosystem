"""
Alertmanager Configuration
Routing and notification for all alerts
"""

global:
  slack_api_url: 'https://hooks.slack.com/services/T00000000/B00000000/XXXXXXXXXXXXXXXXXXXXXXXX'
  pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'
  opsgenie_api_key: 'your-opsgenie-api-key'
  victorops_api_key: 'your-victorops-api-key'
  wechat_api_url: 'https://qyapi.weixin.qq.com/cgi-bin/'
  wechat_api_secret: 'your-wechat-secret'
  wechat_api_corp_id: 'your-corp-id'
  
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alertmanager@tradingecosystem.com'
  smtp_auth_username: 'alerts@tradingecosystem.com'
  smtp_auth_password: 'your-email-password'
  smtp_require_tls: true

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  
  routes:
    # Critical infrastructure alerts
    - match:
        severity: critical
        team: platform
      receiver: 'pagerduty-platform'
      group_wait: 10s
      repeat_interval: 1h
      routes:
        - match:
            alertname: 'ServiceDown|HighErrorRate'
          receiver: 'pagerduty-platform-critical'
          repeat_interval: 30m
    
    # Trading engine alerts
    - match:
        team: trading
      receiver: 'slack-trading'
      group_wait: 10s
      routes:
        - match:
            severity: critical
          receiver: 'pagerduty-trading'
          continue: true
    
    # Market data alerts
    - match:
        team: market-data
      receiver: 'slack-market-data'
    
    # Database alerts
    - match:
        team: database
      receiver: 'slack-database'
      routes:
        - match:
            severity: critical
          receiver: 'pagerduty-database'
    
    # Security alerts
    - match:
        team: security
      receiver: 'pagerduty-security'
      group_wait: 10s
    
    # Business metrics
    - match:
        team: business
      receiver: 'slack-business'
      repeat_interval: 24h

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service']

receivers:
  # ==================== SLACK RECEIVERS ====================
  
  - name: 'default'
    slack_configs:
      - channel: '#alerts'
        title: '{{ template "slack.default.title" . }}'
        text: '{{ template "slack.default.text" . }}'
        send_resolved: true
        icon_url: 'https://grafana.com/assets/img/fav32.png'
  
  - name: 'slack-trading'
    slack_configs:
      - channel: '#trading-alerts'
        title: '🚨 Trading Alert: {{ .GroupLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
            *Alert:* {{ .Annotations.summary }}
            *Description:* {{ .Annotations.description }}
            *Severity:* {{ .Labels.severity }}
            *Instance:* {{ .Labels.instance }}
            *Value:* {{ .Annotations.value }}
            *Time:* {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}
        send_resolved: true
        actions:
          - type: button
            text: 'View in Grafana'
            url: 'https://grafana.tradingecosystem.com'
          - type: button
            text: 'Runbook'
            url: '{{ .Annotations.runbook }}'
  
  - name: 'slack-market-data'
    slack_configs:
      - channel: '#market-data-alerts'
        send_resolved: true
  
  - name: 'slack-database'
    slack_configs:
      - channel: '#database-alerts'
        send_resolved: true
  
  - name: 'slack-business'
    slack_configs:
      - channel: '#business-alerts'
        send_resolved: true
        title: '📊 Business Alert'

  # ==================== PAGERDUTY RECEIVERS ====================
  
  - name: 'pagerduty-platform'
    pagerduty_configs:
      - service_key: 'your-pagerduty-service-key'
        send_resolved: true
        description: '{{ template "pagerduty.default.description" .}}'
        client: 'Prometheus Alertmanager'
        client_url: 'https://alertmanager.tradingecosystem.com'
        details:
          firing: '{{ template "pagerduty.default.instances" . }}'
          severity: '{{ .CommonLabels.severity }}'
  
  - name: 'pagerduty-platform-critical'
    pagerduty_configs:
      - service_key: 'your-pagerduty-critical-key'
        send_resolved: true
        severity: 'critical'
  
  - name: 'pagerduty-trading'
    pagerduty_configs:
      - service_key: 'your-pagerduty-trading-key'
        send_resolved: true
  
  - name: 'pagerduty-database'
    pagerduty_configs:
      - service_key: 'your-pagerduty-database-key'
        send_resolved: true
  
  - name: 'pagerduty-security'
    pagerduty_configs:
      - service_key: 'your-pagerduty-security-key'
        send_resolved: true
        severity: 'critical'

  # ==================== EMAIL RECEIVERS ====================
  
  - name: 'email'
    email_configs:
      - to: 'oncall@tradingecosystem.com'
        send_resolved: true
        headers:
          subject: '{{ template "email.default.subject" . }}'
        html: '{{ template "email.default.html" . }}'

  # ==================== WEBHOOK RECEIVERS ====================
  
  - name: 'webhook'
    webhook_configs:
      - url: 'http://webhook-service:8080/alerts'
        send_resolved: true
        http_config:
          basic_auth:
            username: 'alertmanager'
            password: 'webhook-password'

  # ==================== OPSGENIE RECEIVERS ====================
  
  - name: 'opsgenie'
    opsgenie_configs:
      - api_key: 'your-opsgenie-api-key'
        send_resolved: true
        priority: '{{ if eq .CommonLabels.severity "critical" }}P1{{ else }}P3{{ end }}'
        responders:
          - type: 'team'
            name: 'platform'

  # ==================== VICTOROPS RECEIVERS ====================
  
  - name: 'victorops'
    victorops_configs:
      - api_key: 'your-victorops-api-key'
        routing_key: 'platform'
        send_resolved: true
        message_type: '{{ if .Alerts.Firing }}CRITICAL{{ else }}RECOVERY{{ end }}'

templates:
  - '/etc/alertmanager/templates/*.tmpl'