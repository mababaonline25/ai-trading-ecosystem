"""
Production Docker Compose Configuration
Enterprise-grade deployment with high availability and scalability
"""

version: '3.8'

services:
  # ==================== DATABASE SERVICES ====================
  
  postgres:
    image: postgres:15-alpine
    container_name: trading_postgres_prod
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_REPLICATION: "true"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/data/migrations:/docker-entrypoint-initdb.d
      - ./backup/postgres:/backup
    ports:
      - "5432:5432"
    networks:
      - trading_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  postgres_replica:
    image: postgres:15-alpine
    container_name: trading_postgres_replica
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_MASTER_HOST: postgres
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    networks:
      - trading_network
    depends_on:
      - postgres
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 30s
      timeout: 10s
      retries: 5

  mongodb:
    image: mongo:6
    container_name: trading_mongodb_prod
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./backup/mongodb:/backup
    ports:
      - "27017:27017"
    networks:
      - trading_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 5

  mongodb_replica:
    image: mongo:6
    container_name: trading_mongodb_replica
    command: mongod --replSet rs0 --bind_ip_all
    volumes:
      - mongodb_replica_data:/data/db
    networks:
      - trading_network
    depends_on:
      - mongodb
    restart: unless-stopped
    deploy:
      replicas: 2

  redis:
    image: redis:7-alpine
    container_name: trading_redis_prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 4gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - trading_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis_sentinel:
    image: redis:7-alpine
    container_name: trading_redis_sentinel
    command: redis-sentinel /usr/local/etc/redis/sentinel.conf
    volumes:
      - ./config/redis/sentinel.conf:/usr/local/etc/redis/sentinel.conf
    networks:
      - trading_network
    depends_on:
      - redis
    restart: unless-stopped
    deploy:
      replicas: 3

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: trading_rabbitmq_prod
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_COOKIE}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_logs:/var/log/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - trading_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    container_name: trading_elasticsearch_prod
    environment:
      - node.name=elasticsearch
      - cluster.name=trading-logs
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms4g -Xmx4g"
      - xpack.security.enabled=false
      - xpack.monitoring.collection.enabled=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - trading_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

  logstash:
    image: docker.elastic.co/logstash/logstash:8.10.0
    container_name: trading_logstash_prod
    volumes:
      - ./config/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
      - ./config/logstash/logstash.yml:/usr/share/logstash/config/logstash.yml
      - ./logs:/var/log/trading
    ports:
      - "5000:5000"
      - "9600:9600"
    networks:
      - trading_network
    depends_on:
      - elasticsearch
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.0
    container_name: trading_kibana_prod
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      SERVER_NAME: kibana
      SERVER_HOST: "0.0.0.0"
    ports:
      - "5601:5601"
    networks:
      - trading_network
    depends_on:
      - elasticsearch
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # ==================== BACKEND SERVICES ====================

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
      args:
        - ENV=production
    image: ${DOCKER_REGISTRY}/trading-backend:${VERSION}
    container_name: trading_backend_prod
    environment:
      - ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_USER=${MONGO_USER}
      - MONGO_PASSWORD=${MONGO_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_SECRET_KEY=${BINANCE_SECRET_KEY}
      - SENTRY_DSN=${SENTRY_DSN}
      - NEW_RELIC_LICENSE_KEY=${NEW_RELIC_LICENSE_KEY}
    volumes:
      - ./backend:/app
      - backend_models:/app/models
      - backend_logs:/var/log/trading
      - ./config/backend:/app/config
    ports:
      - "8000:8000"
    networks:
      - trading_network
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    restart: unless-stopped
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.tradingecosystem.com`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"

  backend_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    image: ${DOCKER_REGISTRY}/trading-worker:${VERSION}
    container_name: trading_worker_prod
    environment:
      - ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
    volumes:
      - ./backend:/app
      - backend_logs:/var/log/trading
    networks:
      - trading_network
    depends_on:
      - backend
      - rabbitmq
      - redis
    restart: unless-stopped
    deploy:
      replicas: 5
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    command: celery -A backend.workers.celery_app worker --loglevel=info --concurrency=4

  backend_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: trading_beat_prod
    environment:
      - ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
    volumes:
      - ./backend:/app
      - backend_logs:/var/log/trading
    networks:
      - trading_network
    depends_on:
      - backend
      - rabbitmq
      - redis
    restart: unless-stopped
    command: celery -A backend.workers.celery_app beat --loglevel=info

  # ==================== FRONTEND SERVICES ====================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - NEXT_PUBLIC_API_URL=https://api.tradingecosystem.com
        - NEXT_PUBLIC_WS_URL=wss://ws.tradingecosystem.com
    image: ${DOCKER_REGISTRY}/trading-frontend:${VERSION}
    container_name: trading_frontend_prod
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.tradingecosystem.com
      - NEXT_PUBLIC_WS_URL=wss://ws.tradingecosystem.com
    volumes:
      - frontend_build:/app/.next
      - frontend_public:/app/public
    ports:
      - "3000:3000"
    networks:
      - trading_network
    depends_on:
      - backend
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`tradingecosystem.com`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"

  # ==================== MICROSERVICES ====================

  market_data_service:
    build:
      context: ./services/market_data
      dockerfile: Dockerfile.prod
    image: ${DOCKER_REGISTRY}/market-data:${VERSION}
    container_name: market_data_prod
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
    volumes:
      - market_data_logs:/var/log/market-data
    networks:
      - trading_network
    depends_on:
      - redis
      - rabbitmq
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  trading_engine:
    build:
      context: ./services/trading_engine
      dockerfile: Dockerfile.prod
    image: ${DOCKER_REGISTRY}/trading-engine:${VERSION}
    container_name: trading_engine_prod
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
    volumes:
      - trading_engine_logs:/var/log/trading-engine
    networks:
      - trading_network
    depends_on:
      - redis
      - rabbitmq
    restart: unless-stopped
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  ai_engine:
    build:
      context: ./services/ai_engine
      dockerfile: Dockerfile.prod
    image: ${DOCKER_REGISTRY}/ai-engine:${VERSION}
    container_name: ai_engine_prod
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MODEL_PATH=/models
    volumes:
      - ai_models:/models
      - ai_logs:/var/log/ai-engine
    networks:
      - trading_network
    depends_on:
      - redis
      - rabbitmq
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 8G
        reservations:
          memory: 4G

  notification_service:
    build:
      context: ./services/notification
      dockerfile: Dockerfile.prod
    image: ${DOCKER_REGISTRY}/notification:${VERSION}
    container_name: notification_prod
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
    volumes:
      - notification_logs:/var/log/notification
    networks:
      - trading_network
    depends_on:
      - redis
      - rabbitmq
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  websocket_service:
    build:
      context: ./services/websocket
      dockerfile: Dockerfile.prod
    image: ${DOCKER_REGISTRY}/websocket:${VERSION}
    container_name: websocket_prod
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
    volumes:
      - websocket_logs:/var/log/websocket
    ports:
      - "8001:8001"
    networks:
      - trading_network
    depends_on:
      - redis
      - rabbitmq
    restart: unless-stopped
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.websocket.rule=Host(`ws.tradingecosystem.com`)"
      - "traefik.http.routers.websocket.entrypoints=websecure"
      - "traefik.http.routers.websocket.tls.certresolver=letsencrypt"
      - "traefik.http.services.websocket.loadbalancer.server.port=8001"

  # ==================== REVERSE PROXY & LOAD BALANCING ====================

  traefik:
    image: traefik:v2.10
    container_name: trading_traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@tradingecosystem.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.buckets=0.1,0.3,1.2,5.0"
      - "--accesslog=true"
      - "--accesslog.filepath=/var/log/traefik/access.log"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./config/traefik:/etc/traefik"
      - "traefik_data:/letsencrypt"
      - "traefik_logs:/var/log/traefik"
    networks:
      - trading_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  nginx:
    image: nginx:alpine
    container_name: trading_nginx
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./config/nginx/ssl:/etc/nginx/ssl
      - ./frontend/public:/usr/share/nginx/html
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    networks:
      - trading_network
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ==================== MONITORING & OBSERVABILITY ====================

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: trading_prometheus
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./config/prometheus/rules:/etc/prometheus/rules
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - trading_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  grafana:
    image: grafana/grafana:10.0.3
    container_name: trading_grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-worldmap-panel
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_ROOT_URL=https://grafana.tradingecosystem.com
    volumes:
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./config/grafana/notifiers:/etc/grafana/provisioning/notifiers
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - trading_network
    depends_on:
      - prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.tradingecosystem.com`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  alertmanager:
    image: prom/alertmanager:v0.25.0
    container_name: trading_alertmanager
    volumes:
      - ./config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "9093:9093"
    networks:
      - trading_network
    restart: unless-stopped

  node_exporter:
    image: prom/node-exporter:v1.6.0
    container_name: trading_node_exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "9100:9100"
    networks:
      - trading_network
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: trading_cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8081:8080"
    networks:
      - trading_network
    restart: unless-stopped
    privileged: true

  # ==================== LOGGING & TRACING ====================

  fluentd:
    image: fluent/fluentd:v1.16-1
    container_name: trading_fluentd
    volumes:
      - ./config/fluentd/fluent.conf:/fluentd/etc/fluent.conf
      - ./logs:/fluentd/log
      - fluentd_data:/fluentd/data
    ports:
      - "24224:24224"
      - "24224:24224/udp"
    networks:
      - trading_network
    restart: unless-stopped
    depends_on:
      - elasticsearch

  jaeger:
    image: jaegertracing/all-in-one:1.48
    container_name: trading_jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
      - "14250:14250"  # Jaeger gRPC
    networks:
      - trading_network
    restart: unless-stopped

  # ==================== JOB SCHEDULING & BACKUP ====================

  backup:
    image: alpine:latest
    container_name: trading_backup
    volumes:
      - ./backup:/backup
      - postgres_data:/data/postgres:ro
      - mongodb_data:/data/mongodb:ro
      - redis_data:/data/redis:ro
      - ./scripts/backup.sh:/backup.sh
    networks:
      - trading_network
    command: sh /backup.sh
    restart: unless-stopped
    deploy:
      replicas: 1
    entrypoint: |
      sh -c '
      apk add --no-cache postgresql-client mongodb-tools redis
      while true; do
        /backup.sh
        sleep 86400  # 24 hours
      done
      '

  # ==================== CACHE & CDN ====================

  varnish:
    image: varnish:7.3
    container_name: trading_varnish
    volumes:
      - ./config/varnish/default.vcl:/etc/varnish/default.vcl
    ports:
      - "6081:80"
    networks:
      - trading_network
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    tmpfs:
      - /var/lib/varnish:uid=1000,gid=1000

  # ==================== DEVELOPMENT TOOLS ====================

  pgadmin:
    image: dpage/pgadmin4:7
    container_name: trading_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - trading_network
    depends_on:
      - postgres
    restart: unless-stopped
    profiles:
      - dev

  mongo_express:
    image: mongo-express:1.0.0-20-alpine3.18
    container_name: trading_mongo_express
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD}
    ports:
      - "8082:8081"
    networks:
      - trading_network
    depends_on:
      - mongodb
    restart: unless-stopped
    profiles:
      - dev

  redis_commander:
    image: rediscommander/redis-commander:latest
    container_name: trading_redis_commander
    environment:
      REDIS_HOSTS: local:redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "8083:8081"
    networks:
      - trading_network
    depends_on:
      - redis
    restart: unless-stopped
    profiles:
      - dev

  rabbitmq_management:
    image: rabbitmq:3-management-alpine
    container_name: trading_rabbitmq_mgmt
    ports:
      - "15673:15672"
    networks:
      - trading_network
    depends_on:
      - rabbitmq
    restart: unless-stopped
    profiles:
      - dev


# ==================== VOLUMES ====================

volumes:
  # Database volumes
  postgres_data:
    driver: local
    driver_opts:
      type: none
      device: /data/postgres
      o: bind
  postgres_replica_data:
    driver: local
  mongodb_data:
    driver: local
    driver_opts:
      type: none
      device: /data/mongodb
      o: bind
  mongodb_config:
    driver: local
  mongodb_replica_data:
    driver: local
  redis_data:
    driver: local
    driver_opts:
      type: none
      device: /data/redis
      o: bind
  rabbitmq_data:
    driver: local
  rabbitmq_logs:
    driver: local
  
  # Elasticsearch volumes
  elasticsearch_data:
    driver: local
    driver_opts:
      type: none
      device: /data/elasticsearch
      o: bind
  
  # Backend volumes
  backend_models:
    driver: local
  backend_logs:
    driver: local
  
  # Frontend volumes
  frontend_build:
    driver: local
  frontend_public:
    driver: local
  
  # Microservice volumes
  market_data_logs:
    driver: local
  trading_engine_logs:
    driver: local
  ai_models:
    driver: local
    driver_opts:
      type: none
      device: /data/ai_models
      o: bind
  ai_logs:
    driver: local
  notification_logs:
    driver: local
  websocket_logs:
    driver: local
  
  # Monitoring volumes
  prometheus_data:
    driver: local
    driver_opts:
      type: none
      device: /data/prometheus
      o: bind
  grafana_data:
    driver: local
    driver_opts:
      type: none
      device: /data/grafana
      o: bind
  alertmanager_data:
    driver: local
  
  # Traefik volumes
  traefik_data:
    driver: local
  traefik_logs:
    driver: local
  
  # Nginx volumes
  nginx_cache:
    driver: local
  nginx_logs:
    driver: local
  
  # Fluentd volumes
  fluentd_data:
    driver: local
  
  # Development volumes
  pgadmin_data:
    driver: local


# ==================== NETWORKS ====================

networks:
  trading_network:
    driver: overlay
    ipam:
      config:
        - subnet: 10.0.0.0/24
          gateway: 10.0.0.1
    attachable: true


# ==================== SECRETS ====================

secrets:
  db_password:
    file: ./secrets/db_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  api_keys:
    file: ./secrets/api_keys.json


# ==================== CONFIGS ====================

configs:
  prometheus_config:
    file: ./config/prometheus/prometheus.yml
  grafana_dashboards:
    file: ./config/grafana/dashboards/
  nginx_config:
    file: ./config/nginx/nginx.conf