# Service Level Objectives (SLOs) for Trading Platform

apiVersion: v1
kind: ServiceLevelObjectives
metadata:
  name: trading-platform-slos
  environment: production
  version: 1.0.0

spec:
  # ==================== API SLOs ====================
  
  - name: api-availability
    description: "API service availability"
    service: backend
    sli:
      type: availability
      measurement:
        numerator: sum(rate(http_requests_total{status!~"5.."}[1m]))
        denominator: sum(rate(http_requests_total[1m]))
    target:
      rolling_window: 30d
      objective: 99.99
    alerts:
      - name: APIAvailabilityWarning
        threshold: 99.95
        severity: warning
      - name: APIAvailabilityCritical
        threshold: 99.9
        severity: critical
  
  - name: api-latency
    description: "API response time P95"
    service: backend
    sli:
      type: latency
      measurement:
        query: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))
      threshold: 500ms
    target:
      rolling_window: 7d
      objective: 99.0
    alerts:
      - name: APILatencyWarning
        threshold: 300ms
        severity: warning
      - name: APILatencyCritical
        threshold: 500ms
        severity: critical
  
  - name: api-error-rate
    description: "API error rate"
    service: backend
    sli:
      type: error_rate
      measurement:
        numerator: sum(rate(http_requests_total{status=~"5.."}[5m]))
        denominator: sum(rate(http_requests_total[5m]))
      threshold: 1.0
    target:
      rolling_window: 7d
      objective: 99.5
    alerts:
      - name: APIErrorRateWarning
        threshold: 0.5
        severity: warning
      - name: APIErrorRateCritical
        threshold: 2.0
        severity: critical

  # ==================== TRADING ENGINE SLOs ====================
  
  - name: order-execution-latency
    description: "Order execution latency P99"
    service: trading-engine
    sli:
      type: latency
      measurement:
        query: histogram_quantile(0.99, rate(order_execution_duration_seconds_bucket[5m]))
      threshold: 100ms
    target:
      rolling_window: 7d
      objective: 99.9
    alerts:
      - name: OrderLatencyWarning
        threshold: 50ms
        severity: warning
      - name: OrderLatencyCritical
        threshold: 100ms
        severity: critical
  
  - name: order-success-rate
    description: "Order execution success rate"
    service: trading-engine
    sli:
      type: success_rate
      measurement:
        numerator: sum(rate(order_success_total[5m]))
        denominator: sum(rate(order_attempts_total[5m]))
      threshold: 99.5
    target:
      rolling_window: 7d
      objective: 99.5
    alerts:
      - name: OrderSuccessWarning
        threshold: 99.0
        severity: warning
      - name: OrderSuccessCritical
        threshold: 98.0
        severity: critical

  # ==================== MARKET DATA SLOs ====================
  
  - name: market-data-freshness
    description: "Market data freshness"
    service: market-data
    sli:
      type: freshness
      measurement:
        query: time() - market_data_timestamp_seconds
      threshold: 1s
    target:
      rolling_window: 7d
      objective: 99.9
    alerts:
      - name: MarketDataStaleWarning
        threshold: 2s
        severity: warning
      - name: MarketDataStaleCritical
        threshold: 5s
        severity: critical
  
  - name: websocket-connections
    description: "WebSocket connection success rate"
    service: market-data
    sli:
      type: success_rate
      measurement:
        numerator: sum(rate(websocket_connection_success_total[5m]))
        denominator: sum(rate(websocket_connection_attempts_total[5m]))
      threshold: 99.0
    target:
      rolling_window: 7d
      objective: 99.0

  # ==================== DATABASE SLOs ====================
  
  - name: database-availability
    description: "Database availability"
    service: postgresql
    sli:
      type: availability
      measurement:
        query: pg_up
      threshold: 1
    target:
      rolling_window: 30d
      objective: 99.99
  
  - name: query-latency
    description: "Database query latency P95"
    service: postgresql
    sli:
      type: latency
      measurement:
        query: histogram_quantile(0.95, rate(pg_stat_statements_total_time_bucket[5m]))
      threshold: 100ms
    target:
      rolling_window: 7d
      objective: 99.0
  
  - name: replication-lag
    description: "Database replication lag"
    service: postgresql
    sli:
      type: latency
      measurement:
        query: pg_replication_lag
      threshold: 5s
    target:
      rolling_window: 7d
      objective: 99.9

  # ==================== CACHE SLOs ====================
  
  - name: cache-hit-rate
    description: "Redis cache hit rate"
    service: redis
    sli:
      type: ratio
      measurement:
        numerator: sum(rate(redis_keyspace_hits_total[5m]))
        denominator: sum(rate(redis_keyspace_hits_total[5m]) + rate(redis_keyspace_misses_total[5m]))
      threshold: 90.0
    target:
      rolling_window: 7d
      objective: 90.0

  # ==================== MESSAGE QUEUE SLOs ====================
  
  - name: message-queue-latency
    description: "Message processing latency"
    service: rabbitmq
    sli:
      type: latency
      measurement:
        query: histogram_quantile(0.95, rate(rabbitmq_message_processing_seconds_bucket[5m]))
      threshold: 100ms
    target:
      rolling_window: 7d
      objective: 99.0

  # ==================== AI ENGINE SLOs ====================
  
  - name: ai-inference-latency
    description: "AI inference latency"
    service: ai-engine
    sli:
      type: latency
      measurement:
        query: histogram_quantile(0.95, rate(ai_inference_duration_seconds_bucket[5m]))
      threshold: 2s
    target:
      rolling_window: 7d
      objective: 99.0
  
  - name: model-accuracy
    description: "AI model prediction accuracy"
    service: ai-engine
    sli:
      type: accuracy
      measurement:
        query: avg(ai_model_accuracy)
      threshold: 70.0
    target:
      rolling_window: 30d
      objective: 70.0

  # ==================== INFRASTRUCTURE SLOs ====================
  
  - name: node-availability
    description: "Kubernetes node availability"
    service: kubernetes
    sli:
      type: availability
      measurement:
        query: sum(kube_node_status_condition{condition="Ready",status="true"}) / sum(kube_node_status_condition{condition="Ready"})
      threshold: 99.0
    target:
      rolling_window: 30d
      objective: 99.0
  
  - name: pod-availability
    description: "Pod availability"
    service: kubernetes
    sli:
      type: availability
      measurement:
        query: sum(kube_deployment_status_replicas_available) / sum(kube_deployment_status_replicas)
      threshold: 99.9
    target:
      rolling_window: 7d
      objective: 99.9

  # ==================== BUSINESS SLOs ====================
  
  - name: trading-volume
    description: "Trading volume growth"
    service: business
    sli:
      type: growth
      measurement:
        query: sum(increase(trading_volume_usd_total[30d]))
      threshold: 10.0  # 10% growth
    target:
      rolling_window: 30d
      objective: 10.0
  
  - name: user-retention
    description: "User retention rate"
    service: business
    sli:
      type: ratio
      measurement:
        query: user_retention_rate_30d
      threshold: 80.0
    target:
      rolling_window: 30d
      objective: 80.0

  # ==================== SECURITY SLOs ====================
  
  - name: vulnerability-patching
    description: "Critical vulnerability patching time"
    service: security
    sli:
      type: latency
      measurement:
        query: avg(vulnerability_patch_time_seconds)
      threshold: 86400  # 24 hours
    target:
      rolling_window: 30d
      objective: 99.0