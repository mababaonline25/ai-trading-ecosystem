"""
Kubernetes Namespace Configuration
Production environment isolation
"""

apiVersion: v1
kind: Namespace
metadata:
  name: trading-production
  labels:
    name: trading-production
    environment: production
    team: platform
    managed-by: kubectl
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-quota
  namespace: trading-production
spec:
  hard:
    requests.cpu: "100"
    requests.memory: "200Gi"
    limits.cpu: "200"
    limits.memory: "400Gi"
    persistentvolumeclaims: "50"
    pods: "100"
    services: "50"
    secrets: "100"
    configmaps: "100"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: resource-limits
  namespace: trading-production
spec:
  limits:
  - max:
      cpu: "4"
      memory: "8Gi"
    min:
      cpu: "100m"
      memory: "256Mi"
    default:
      cpu: "500m"
      memory: "1Gi"
    defaultRequest:
      cpu: "200m"
      memory: "512Mi"
    type: Container