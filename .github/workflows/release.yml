"""
Release Management Pipeline
Automated versioning and release creation
"""

name: Release Management

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
        type: string
      prerelease:
        description: 'Is pre-release'
        required: true
        type: boolean
        default: false

jobs:
  # ==================== CREATE RELEASE ====================

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Generate changelog
        id: changelog
        uses: metcalfc/changelog-generator@v4
        with:
          myToken: ${{ secrets.GITHUB_TOKEN }}
          base-ref: ${{ github.event.repository.default_branch }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease || false }}
          files: |
            backend/dist/*.whl
            backend/dist/*.tar.gz
            frontend/dist/*.zip
          generate_release_notes: true

      - name: Upload release assets
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./backend/dist/backend-${{ github.ref_name }}.whl
          asset_name: backend-${{ github.ref_name }}.whl
          asset_content_type: application/octet-stream

  # ==================== BUILD RELEASE ARTIFACTS ====================

  build-artifacts:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build Python package
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install build wheel
          python -m build

      - name: Upload Python package
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist-${{ matrix.os }}-${{ matrix.python-version }}
          path: backend/dist/*

      - name: Build Docker image
        run: |
          docker build -t trading-platform:${{ github.ref_name }}-${{ matrix.os }} \
            --build-arg VERSION=${{ github.ref_name }} \
            --build-arg OS=${{ matrix.os }} \
            -f Dockerfile.release .

  # ==================== PUBLISH TO REGISTRIES ====================

  publish:
    name: Publish to Registries
    runs-on: ubuntu-latest
    needs: build-artifacts
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        run: |
          VERSION=${{ github.ref_name }}
          
          # Backend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/trading-backend:$VERSION ./backend
          docker build -t ghcr.io/${{ github.repository }}/backend:$VERSION ./backend
          
          # Frontend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/trading-frontend:$VERSION ./frontend
          docker build -t ghcr.io/${{ github.repository }}/frontend:$VERSION ./frontend
          
          # Push all images
          docker push ${{ secrets.DOCKER_USERNAME }}/trading-backend:$VERSION
          docker push ${{ secrets.DOCKER_USERNAME }}/trading-frontend:$VERSION
          docker push ghcr.io/${{ github.repository }}/backend:$VERSION
          docker push ghcr.io/${{ github.repository }}/frontend:$VERSION

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          cd backend
          pip install twine
          twine upload dist/*

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd frontend
          npm publish

  # ==================== DEPLOY DOCUMENTATION ====================

  deploy-docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build documentation
        run: |
          cd docs
          pip install -r requirements.txt
          mkdocs build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/site
          publish_branch: gh-pages
          destination_dir: ${{ github.ref_name }}

  # ==================== NOTIFY STAKEHOLDERS ====================

  notify:
    name: Notify Stakeholders
    runs-on: ubuntu-latest
    needs: [create-release, publish, deploy-docs]
    if: always()
    steps:
      - name: Send Slack notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
          text: |
            🚀 Release ${{ github.ref_name }} has been published!
            
            📦 Docker images: ghcr.io/${{ github.repository }}
            📚 Documentation: https://docs.tradingecosystem.com/${{ github.ref_name }}
            🔗 Release notes: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: New Release ${{ github.ref_name }} Published
          to: team@tradingecosystem.com
          from: CI/CD Bot
          body: |
            A new release ${{ github.ref_name }} has been published.
            
            Release Notes:
            ${{ steps.changelog.outputs.changelog }}
            
            Docker Images: ghcr.io/${{ github.repository }}
            Documentation: https://docs.tradingecosystem.com/${{ github.ref_name }}